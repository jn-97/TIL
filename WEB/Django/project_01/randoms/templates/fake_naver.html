<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fake_search</title>
</head>
<body>
  <h1>Naver</h1>
  <form action="https://search.naver.com/search.naver">
    검색어: <input type="text" name="query">
    <input type="submit">
  </form>

  <h1>Google</h1>
  <form action="https://www.google.com/search">
    검색어: <input type="text" name="q">
    <input type="submit">
  </form>

  <h1>Youtube</h1>
  <form action="https://www.youtube.com/result">
    검색어: <input type="text" name="search_query">
    <input type="submit">
  </form>
</body>
</html>

<!-- https://search.naver.com : 주소(누구에게)
/search.naver?query=아이유 : 주문서(무엇을)
네이버에서 검색한 후 검색창을 검사하기 눌러보면 name=query 라고 되어있음 !-->

<!-- https://search.naver.com/search.naver? : form의 action에 정의하는 내용 
=> query=아이유 : input으로 정의한 데이터-->

<!-- 구글: name=q -> https://www.google.com/search?q=아이유-->

<!-- 유튜브 https://www.youtube.com/results?search_query=아이유-->
<!-- 유튜브는 안됨 -->
