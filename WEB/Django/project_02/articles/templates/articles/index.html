{% extends 'base.html' %}

{% block content %}

<div>
  <h1>방명록</h1>
</div>

<div>
  <h2>글목록</h2>
  {% for content in guestbook %}
    <p>{{ content.content }}</p>
    <!-- content안에서 content라는 id를 가진 요소 출력 -->
  {% endfor %}
</div>

<div>
  <h2>글 작성</h2>
  <form action="{% url 'articles:create' %}" method="GET">
    <input type="text" name="content">
    <input type="submit">
  </form>
</div>

{% endblock content %}
