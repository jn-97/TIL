{% extends 'base.html' %}

{% block content %}

<form action="{% url 'movies:create' %}">
  <div class="mb-3">
    <label class="form-label fw-bold">제목</label>
    <input type="text" class="form-control" maxlength=80 name="title">
  </div>
  <div class="mb-3">
    <label class="form-label fw-bold">내용</label>
    <textarea class="form-control" rows="3" name="content"></textarea>
  </div>
  <button type="submit" class="btn btn-primary form-control">리뷰 쓰기</button>
</form>

{% endblock content %}
