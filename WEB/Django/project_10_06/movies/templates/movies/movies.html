{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center pt-5">
  <table class="table" style="width:500px;">
    <thead>
      <tr>
        <th scope="col">PK</th>
        <th scope="col">영화 제목</th>
      </tr>
    </thead>
    <tbody>
      {% for movie in movies %}
      <tr>
        <th scope="row">{{ movie.id }}</th>
        <td>{{ movie.title }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
