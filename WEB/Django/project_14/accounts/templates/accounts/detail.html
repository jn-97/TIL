{% extends 'base.html' %}
{% load bootstrap5 %}

{% block body %}

<h1>{{ user.username }}님의 프로필</h1>
<p>{{ user.email }} | {{ user.username }}</p>
<h3>작성한 글</h3>
{% for article in user.article_set.all %}

{% endfor %}

{% endblock body %}
