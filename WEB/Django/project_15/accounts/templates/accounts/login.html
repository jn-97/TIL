{% extends 'base.html' %}
{% load bootstrap5 %}

{% block body %}

<div class="d-flex justify-content-between">
    <h1>로그인</h1>
    <a href="{% url 'accounts:signup' %}" class="button">회원가입</a>
</div>

<form action="" method="POST">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% bootstrap_button button_type="submit" content="OK" %}
</form>

{% endblock body %}
