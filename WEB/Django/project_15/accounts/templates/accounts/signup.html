{% extends 'base.html' %}
{% load bootstrap5 %}

{% block body %}

<div class="d-flex justify-content-between">
  <h1>회원가입</h1>
  <a href="{% url 'accounts:login' %}" class="button">로그인</a>
</div>

<form action="" method="POST">
  {% csrf_token %}
  {% bootstrap_form form %}
  {% bootstrap_button button_type="submit" content="확인" %}
</form>

{% endblock body %}
