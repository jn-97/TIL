{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block body %}

<h1 class="d-flex justify-content-center">로그인</h1>
<form action="" method="POST">
  {% csrf_token %}
  {% bootstrap_form form %}
  <div class="d-grid gap-2">
    <a class="btn btn-outline-primary" type="submit">확인</a>
  </div>
</form>

{% endblock body %}
