<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      margin: 1rem;
      width: 5rem;
      height: 5rem;
      background-color: red;
    }
    .box-center {
      margin: 0 auto;
    }
    .box-right {
      margin-left: auto;
    }
    .align-center {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="box"></div>
  <div class="box box-center"></div>
  <div class="box box-right"></div>
  <div class="box align-center"></div>
  
  <span class="box">1</span>
  <span class="box box-center">1</span>
  <span class="box box-right">1</span>
</body>
</html>
