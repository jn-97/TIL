<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
    
    <!-- CSS -->
    <style>
      .box {
        background-color: grey;
        border: 1px solid black;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.min.js" integrity="sha384-7VPbUDkoPSGFnVtYi0QogXtr74QeVeeIs99Qfg5YCF+TidwNdjvaKZX19NZ/e6oz" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8" crossorigin="anonymous"></script>
  
    <!-- col -->
    <div class="container">
      <div class="d-flex">
        <div class="box">col</div>
        <div class="box">col</div>
        <div class="box">col</div>
      </div>

      <div class="row my-3">
        <div class="col"><div class="box">col</div></div>
        <div class="col"><div class="box">col</div></div>
        <div class="col"><div class="box">col</div></div>
      </div>

      <div class="row my-3">
        <div class="col-5"><div class="box">col</div></div>
        <div class="col-6"><div class="box">col</div></div>
        <div class="col-1"><div class="box">col</div></div>
      </div>

      <div class="row my-3">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4 col-xl-3"><div class="box">col-5</div>
      </div>

      <div class="row my-3">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="box">col</div></div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="box">col</div></div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="box">col</div></div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="box">col</div></div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="box">col</div></div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3"><div class="box">col</div></div>
      </div>

      <div class="row my-3">
        <div class="col-3">
          <div class="box">col-3</div>
        </div>
        <div class="col-3 offset-6">
          <div class="box">col-3</div>
        </div>
      </div>

      <!-- Gutter vs No Gutter -->
      <div class="row my-3">
        <div class="col-6">
          <div class="box">col-6</div>
        </div>
        <div class="col-6">
          <div class="box">col-6</div>
        </div>
      </div>

      <div class="row g-0 my-3">
        <div class="col-6">
          <div class="box">col-6</div>
        </div>
        <div class="col-6">
          <div class="box">col-6</div>
        </div>
      </div>
    </div>

  </body>
</html>
