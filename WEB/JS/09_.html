<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>정말 <span>중요한</span> 내용</h1>
  <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Minima dolorum cumque dolor quaerat, officia ab molestiae excepturi eum quia. Earum itaque assumenda magnam deleniti nisi maxime error voluptatibus cupiditate similique.</p>
  <script>
    const h1 = document.querySelector('h1')
    h1.addEventListener('copy', function(e) {
      // event의 기본동작을 막는다.
      e.preventDefault()
      console.log('복사를 할 수 없습니다.')
    })

    h1.addEventListener('click', function(e) {
      e.preventDefault()
      console.log(e.button)
    })
  </script>
</body>
</html>
