<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .modal-overlay {
      /* position 전체 화면 기준 */
      position: fixed;
      top: 0;
      left: 0;
      /* 배경색, 너비, 높이 */
      background-color: rgba(0, 0, 0, 0.8);
      width: 100%;
      height: 100vh;
      /* 내부 내용 */
      color: white;
      align-items: center;
      justify-content: center;
      /* 기본은 안보이게 설정 */
      display: none;
    }
    .active {
      display: flex;
    }
  </style>
</head>
<body>
  <button id="modal-btn">모달 버튼</button>
  <div id="modal-content" class="modal-overlay">
    모달
    <button id="modal-btn2">취소 버튼</button>
  </div>
  
  <script>
    // 이렇게 아예 만들어서 click 다음에 바로 쓸 수 있다. 
    const modalToggle = function() {
      document.querySelector('#modal-content').classList.toggle('active')
    }

    const modalBtn = document.querySelector('#modal-btn')
    modalBtn.addEventListener('click', function() {
       document.querySelector('#modal-content').classList.toggle('active')
    })

    const modalBtn2 = document.querySelector('#modal-btn2')
    modalBtn2.addEventListener('click', modalToggle)

    const modalOverlay = document.querySelector('#modal-content')
    modalOverlay.addEventListener('click', modalToggle)
  </script>

</body>
</html>
